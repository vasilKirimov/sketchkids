// Get step SVG for a given subject, step index, and age group,

function getStepSvg(subject, stepIdx, ageGroup) {
  const s = (subject || "").toLowerCase();  // normalize case
  const ageKey = s + "_" + ageGroup;
  if (STEP_SVGS[ageKey] && STEP_SVGS[ageKey][stepIdx]) return STEP_SVGS[ageKey][stepIdx];
  if (STEP_SVGS[s] && STEP_SVGS[s][stepIdx]) return STEP_SVGS[s][stepIdx];
  // Fall back to generic stages
  const count = ageGroup === "4-6" ? 4 : ageGroup === "16+" ? 8 : 6;
  const labels = {
    0:"Основна форма", 1:"Втора форма", 2:"Детайли",
    3:"Линии и детайли", 4:"Тяло и крайници", 5:"Оцвети!",
    6:"Засенчване", 7:"Финални детайли"
  };
  const fn = GENERIC_STEPS[Math.min(stepIdx, GENERIC_STEPS.length-1)];
  return fn(labels[stepIdx] || "Продължи!");
}

function getStepAnimData(subject, stepIdx, ageGroup) {
  const s = (subject || "").toLowerCase();  // normalize case
  const ageKey = s + "_" + ageGroup;
  const data = STEP_ANIM_DATA[ageKey] || STEP_ANIM_DATA[s];
  if (data && data[stepIdx] !== undefined) return data[stepIdx];
  // Generic fallback
  const fallbackPaths = (GENERIC_ANIM[stepIdx] || GENERIC_ANIM[0]).map(p => ({
    d:p.d, stroke:"#2a2420", width:2.2, fill:"none"
  }));
  return { bg:"", paths: fallbackPaths, label:"" };
}

async function generateSteps(subject, ageGroup) {
  try {
    const steps = await generateStepsFromAPI(subject, ageGroup);
    return steps;
  } catch (err) {
    console.warn('API fallback:', err.message);
    // Fallback to pre-written steps if API unavailable
    const byAge = STEPS_BY_AGE[ageGroup] || {};
    return byAge[subject] || DEFAULT_STEPS(subject, ageGroup);
  }
}

// ── Real Claude API calls ─────────────────────────────────────────────────────
async function generateStepsFromAPI(subject, ageGroup) {
  const stepCount = ageGroup === "4-6" ? 4 : ageGroup === "16+" ? 8 : 6;
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'generate_steps', subject, ageGroup, stepCount }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `API ${res.status}`);
  }
  return res.json();
}

async function analyzeDrawingAPI(imageData, subject, stepTitle, stepIndex, totalSteps, ageGroup) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      type: 'analyze_drawing',
      image: imageData,
      subject,
      stepTitle: stepTitle || '',
      stepIndex: stepIndex || 0,
      totalSteps: totalSteps || 1,
      ageGroup,
    }),
  });
  const body = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
  if (!body.feedback) throw new Error('Празен отговор от сървъра');
  return body.feedback;
}

const DIFFICULTY_COLOR = { "лесно": "#43A047", "средно": "#FF9800", "трудно": "#E53935" };
const TAG_LABELS = { "животни":"🐾 Животни", "предмети":"🎨 Предмети", "фантазия":"🦸 Фантазия" };



// ─── SKETCH SCREEN ─────────────────────────────────────────────────────────────
function SketchScreen({ profile, onBack }) {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState("всички");
  const [image, setImage] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [fbLoading, setFbLoading] = useState(false);
  const [assistSteps, setAssistSteps] = useState([]);
  const [assistIdx, setAssistIdx] = useState(0);
  const [assistLoading, setAssistLoading] = useState(false);
  const [showAssist, setShowAssist] = useState(false);
  const camera = useCamera();
  const fileRef = useRef(null);

  const resetSketch = () => {
    camera.stop();
    setSelected(null); setImage(null); setFeedback(null);
    setAssistSteps([]); setAssistIdx(0);
    setShowAssist(false); setAssistLoading(false);
  };

  const loadAssist = async () => {
    if (assistSteps.length > 0) { setShowAssist(true); return; }
    setAssistLoading(true);
    try {
      const steps = await generateSteps(selected.title, profile.ageGroup);
      setAssistSteps(steps); setAssistIdx(0); setShowAssist(true);
    } catch(e) {
      setAssistSteps([{step:1,title:"Грешка",instruction:"Не успях да заредя стъпките. Провери интернет и опитай пак.",emoji:"❌"}]);
    }
    setAssistLoading(false);
  };

  const tags = ["всички", ...Object.keys(TAG_LABELS)];

  const filtered = filter === "всички"
    ? SKETCHES
    : SKETCHES.filter(s => s.tags.includes(filter));

  const handlePhoto = async dataUrl => {
    setImage(dataUrl); setFbLoading(true); setFeedback(null);
    let result;
    try {
      result = await analyzeDrawingAPI(dataUrl, subject, step?.title, idx, steps.length, profile.ageGroup);
    } catch(e) {
      result = "❌ Грешка: " + (e.message || "Неизвестна грешка") + " — опитай пак.";
    }
    setFeedback(result); setFbLoading(false);
    const prog = db.getProgress(profile.id);
    prog.push({ id:Date.now(), subject:selected.title, date:new Date().toISOString(), step:1, totalSteps:1, feedback:result, stars:3 });
    db.saveProgress(profile.id, prog);
  };

  // ── Gallery view ──
  if (!selected) return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      <TopBar bg="#FF9800" onBack={onBack} title="🖌️ Скициране по образец"/>
      <div style={{ padding:"16px 20px", maxWidth:580, margin:"0 auto" }}>
        <p style={{ color:C.textMid, fontSize:15, marginBottom:14, lineHeight:1.6, fontWeight:700 }}>
          Избери скица, разгледай я внимателно и я нарисувай на хартия! 📄✏️
        </p>

        {/* Filter tabs */}
        <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
          {tags.map(t =>
            <button key={t} onClick={()=>setFilter(t)}
              style={{ border:"none", borderRadius:99, padding:"8px 16px", fontSize:14, fontWeight:900, cursor:"pointer",
                background: filter===t ? "#FF9800" : C.white,
                color: filter===t ? C.white : C.textMid,
                boxShadow: filter===t ? "0 4px 0 #E65100" : "0 2px 8px rgba(0,0,0,0.08)" }}>
              {t === "всички" ? "🌟 Всички" : TAG_LABELS[t]}
            </button>
          )}
        </div>

        {/* Grid */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
          {filtered.map(sketch =>
            <button key={sketch.id} onClick={()=>setSelected(sketch)}
              style={{ border:`2.5px solid ${C.border}`, borderRadius:20, background:C.white, cursor:"pointer",
                overflow:"hidden", textAlign:"left", padding:0, boxShadow:"0 4px 16px rgba(0,0,0,0.07)",
                transition:"transform 0.15s, box-shadow 0.15s" }}
              onPointerEnter={e=>e.currentTarget.style.transform="translateY(-3px)"}
              onPointerLeave={e=>e.currentTarget.style.transform="none"}>
              <div style={{ background:"#FFFDE7", borderBottom:`2px solid ${C.border}` }}
                dangerouslySetInnerHTML={{ __html: sketch.svg }}/>
              <div style={{ padding:"10px 12px" }}>
                <div style={{ fontWeight:900, fontSize:16, color:C.text }}>{sketch.emoji} {sketch.title}</div>
                <span style={{ fontSize:12, fontWeight:800, color:DIFFICULTY_COLOR[sketch.difficulty] }}>
                  ● {sketch.difficulty}
                </span>
              </div>
            </button>
          )}
        </div>
      </div>
    </div>
  );

  // ── Detail / drawing view ──
  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      <TopBar bg="#FF9800" onBack={resetSketch}
        title={`${selected.emoji} ${selected.title}`}/>
      <div style={{ padding:"20px", maxWidth:560, margin:"0 auto" }}>

        {/* Reference sketch */}
        <Card style={{ marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <p style={{ fontWeight:900, fontSize:17, color:C.text, margin:0 }}>📐 Твоята референция</p>
            <span style={{ fontSize:13, fontWeight:800, color:DIFFICULTY_COLOR[selected.difficulty] }}>
              ● {selected.difficulty}
            </span>
          </div>
          <div style={{ background:"#FFFDE7", borderRadius:16, overflow:"hidden", border:`2px solid ${C.border}`, marginBottom:14 }}
            dangerouslySetInnerHTML={{ __html: selected.svg }}/>
          <div style={{ background:C.primary+"10", borderRadius:14, padding:"10px 14px" }}>
            <p style={{ fontSize:14, color:C.primary, fontWeight:800, margin:0, lineHeight:1.5 }}>
              👀 Разгледай внимателно скицата. Забележи всички форми и линии.
              Вземи молив и хартия и се опитай да я нарисуваш! ✏️
            </p>
          </div>
        </Card>

        {/* Tips */}
               {/* ── Assisted drawing panel ── */}
          <Card style={{ marginBottom:16, background:"#F3E5F5", border:"2px solid #CE93D8" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:showAssist?14:0 }}>
              <div>
                <p style={{ fontWeight:900, fontSize:16, color:C.purple, margin:0 }}>✏️ Асистирано рисуване</p>
                {!showAssist && <p style={{ fontSize:12, color:"#AB47BC", margin:"2px 0 0", fontWeight:700 }}>Стъпка по стъпка с анимиран молив</p>}
              </div>
              <Btn onClick={showAssist?()=>setShowAssist(false):loadAssist}
                bg={showAssist?C.purple:"#CE93D8"} shadow={showAssist?C.purpleDark:"#AB47BC"}
                style={{ padding:"8px 18px", fontSize:14, borderRadius:14 }}>
                {showAssist?"Скрий ▲":assistLoading?"Зарежда…":"Покажи ▼"}
              </Btn>
            </div>
            {showAssist && assistSteps.length>0 && (
              <div>
                <ProgressBar value={assistIdx+1} max={assistSteps.length} color={C.purple}/>
                <div style={{ textAlign:"center", marginBottom:10 }}>
                  <span style={{ background:C.purple+"18", color:C.purple, borderRadius:10, padding:"4px 14px", fontSize:13, fontWeight:900 }}>
                    Стъпка {assistIdx+1} от {assistSteps.length}
                  </span>
                </div>
                <AnimatedStepIllustration subject={selected.title.toLowerCase()} stepIdx={assistIdx}
                  ageGroup={profile.ageGroup} isLeft={profile.handedness==="left"}/>
                <div style={{ background:"white", borderRadius:14, padding:"12px 14px", marginBottom:14 }}>
                  <p style={{ fontSize:17, fontWeight:900, color:C.text, margin:"0 0 4px" }}>
                    {assistSteps[assistIdx]?.emoji} {assistSteps[assistIdx]?.title}
                  </p>
                  <p style={{ fontSize:15, lineHeight:1.7, color:C.textMid, margin:0 }}>
                    {assistSteps[assistIdx]?.instruction}
                  </p>
                </div>
                <div style={{ display:"flex", gap:12 }}>
                  {assistIdx>0 && (
                    <button onClick={()=>setAssistIdx(assistIdx-1)}
                      style={{ ...mkBtn(C.cream,C.border), flex:1, color:C.textMid, boxShadow:"0 4px 0 "+C.border, fontSize:15 }}>
                      ← Предишна
                    </button>
                  )}
                  {assistIdx<assistSteps.length-1 ? (
                    <Btn onClick={()=>setAssistIdx(assistIdx+1)} bg={C.purple} shadow={C.purpleDark} style={{ flex:1, fontSize:15 }}>
                      Следваща →
                    </Btn>
                  ) : (
                    <Btn onClick={()=>setShowAssist(false)} bg={C.yellow} shadow={C.yellowDark} style={{ flex:1, color:C.text, fontSize:15 }}>
                      🎉 Готово!
                    </Btn>
                  )}
                </div>
              </div>
            )}
          </Card>

          <Card style={{ marginBottom:16, background:"#FFF9C4" }}>

// Compress image to max 1024px, JPEG 0.75 — keeps size under 1MB for API
function compressImage(dataUrl, maxPx=1024, quality=0.75) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

function useCamera() {
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const [active, setActive] = useState(false);

  // KEY FIX: set srcObject AFTER React renders the video element into DOM
  useEffect(() => {
    if (active && videoRef.current && streamRef.current) {
      const v = videoRef.current;
      v.srcObject = streamRef.current;
      // iOS Safari needs explicit play() and muted for autoplay
      v.muted = true;
      v.setAttribute('playsinline', '');
      v.setAttribute('autoplay', '');
      const playPromise = v.play();
      if (playPromise) playPromise.catch(() => {
        // Retry once after short delay (iOS quirk)
        setTimeout(() => v.play().catch(() => {}), 300);
      });
    }
  }, [active]);

  const start = async () => {
    // Try environment (back) camera first, fallback to any camera
    const tryGet = async (constraints) => {
      const s = await navigator.mediaDevices.getUserMedia(constraints);
      streamRef.current = s;
      setActive(true); // triggers useEffect above to set srcObject
    };
    try {
      await tryGet({ video: { facingMode: { ideal: 'environment' } } });
    } catch {
      try {
        await tryGet({ video: true });
      } catch {
        alert("Не мога да отворя камерата.\nИди в Safari → Настройки → Камера и избери Разреши.");
      }
    }
  };

  const stop = () => {
    streamRef.current?.getTracks().forEach(t => t.stop());
    streamRef.current = null;
    if (videoRef.current) videoRef.current.srcObject = null;
    setActive(false);
  };

  const capture = async () => {
    const v = videoRef.current, c = canvasRef.current;
    if (!v || !c) return null;
    c.width  = v.videoWidth  || 640;
    c.height = v.videoHeight || 480;
    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
    stop();
    return compressImage(c.toDataURL('image/jpeg', 0.92));
  };

  useEffect(() => () => stop(), []);
  return { videoRef, canvasRef, active, start, stop, capture };
}



function AnimatedStepIllustration({ subject, stepIdx, ageGroup, isLeft }) {
  const svgRef   = useRef(null);
  const pencilRef= useRef(null);
  const rafRef   = useRef(null);

  const data = getStepAnimData(subject, stepIdx, ageGroup);

  // Cumulative background: previous step's complete SVG as embedded image
  // This works automatically for EVERY subject, no per-subject data needed
  const isColorStep = data.paths.length === 0;
  const bgSvg = isColorStep
    ? getStepSvg(subject, stepIdx, ageGroup)       // colour step: show final result
    : stepIdx > 0
      ? getStepSvg(subject, stepIdx - 1, ageGroup) // other steps: show previous result
      : null;                                       // step 0: blank canvas

  const bgDataUrl = bgSvg
    ? 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(bgSvg)
    : null;

  // Animation: pencil draws the new paths for this step
  useEffect(() => {
    if (!svgRef.current) return;
    cancelAnimationFrame(rafRef.current);
    const pathEls = Array.from(svgRef.current.querySelectorAll('.ap'));
    if (!pathEls.length) {
      if (pencilRef.current) pencilRef.current.setAttribute('transform','translate(-200,-200)');
      return;
    }
    const pdata = pathEls.map(el => {
      const len = el.getTotalLength ? el.getTotalLength() : 300;
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = len;
      return { el, len };
    });
    const STEP_DUR = 1400, PAUSE = 120, LOOP_GAP = 2500;
    let loopStart = null;
    function eio(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function tick(now) {
      if (!svgRef.current || !pencilRef.current) return;
      if (!loopStart) loopStart = now;
      const elapsed = now - loopStart;
      const totalCycle = pdata.length * (STEP_DUR + PAUSE) + LOOP_GAP;
      if (elapsed >= totalCycle) { loopStart = now; rafRef.current = requestAnimationFrame(tick); return; }
      let activeIdx = 0;
      for (let i = 0; i < pdata.length; i++) {
        const pStart = i * (STEP_DUR + PAUSE);
        const t = Math.max(0, Math.min(1, (elapsed - pStart) / STEP_DUR));
        pdata[i].el.style.strokeDashoffset = pdata[i].len * (1 - eio(t));
        if (elapsed >= pStart) activeIdx = i;
      }
      const { el: ap, len: al } = pdata[activeIdx];
      const pStart = activeIdx * (STEP_DUR + PAUSE);
      const t = Math.max(0, Math.min(1, (elapsed - pStart) / STEP_DUR));
      const e = eio(t);
      const dist = e * al;
      if (t < 1.0 && t > 0 && pencilRef.current) {
        const pt    = ap.getPointAtLength(dist);
        const ahead = ap.getPointAtLength(Math.min(al, dist + 4));
        const back  = ap.getPointAtLength(Math.max(0, dist - 4));
        const pathAngle = Math.atan2(ahead.y - back.y, ahead.x - back.x) * 180 / Math.PI;
        const tiltDeg   = pathAngle + (isLeft ? -115 : -65);
        const tiltRad   = tiltDeg * Math.PI / 180;
        const TIP = 11;
        pencilRef.current.setAttribute('transform',
          `translate(${pt.x + TIP*Math.sin(tiltRad)},${pt.y - TIP*Math.cos(tiltRad)}) rotate(${tiltDeg})`);
        pencilRef.current.style.opacity = '1';
      } else {
        pencilRef.current.style.opacity = '0';
      }
      rafRef.current = requestAnimationFrame(tick);
    }
    const tid = setTimeout(() => { rafRef.current = requestAnimationFrame(tick); }, 60);
    return () => { clearTimeout(tid); cancelAnimationFrame(rafRef.current); };
  }, [subject, stepIdx, ageGroup, isLeft]);

  return (
    <div style={{ borderRadius:18, overflow:"hidden", border:"2px solid #E8D8C4", background:"#f9f7f2", marginBottom:14 }}>
      <svg ref={svgRef} viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" style={{ width:"100%", display:"block" }}>
        <defs>
          <filter id="pf-a">
            <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <rect width="220" height="220" fill="#f9f7f2"/>

        {/* Cumulative progress — all previous steps as flat background */}
        {bgDataUrl && (
          <image href={bgDataUrl} x="0" y="0" width="220" height="220"/>
        )}

        {/* New paths animated this step */}
        {!isColorStep && (
          <g filter="url(#pf-a)">
            {data.paths.map((p, i) => (
              <path key={i} className="ap"
                d={p.d} stroke={p.stroke||"#2a2420"} strokeWidth={p.width||2.2}
                fill={p.fill||"none"} strokeLinecap="round" strokeLinejoin="round"/>
            ))}
          </g>
        )}

        {/* Pencil (hidden on colour step) */}
        {!isColorStep && (
          <g ref={pencilRef} transform="translate(-200,-200)" style={{ opacity:0, transition:"opacity 0.2s" }}>
            <rect x="-4" y="-22" width="8" height="22" fill="#FFD600" rx="2"/>
            <polygon points="-4,0 4,0 0,11" fill="#C8860A"/>
            <circle cx="0" cy="11" r="2.2" fill="#2a2420"/>
            <rect x="-4" y="-26" width="8" height="6" fill="#FFB7C5" rx="2"/>
            <rect x="-4" y="-22" width="8" height="3" fill="#999"/>
            <rect x="-2.5" y="-20" width="2" height="16" fill="rgba(255,255,255,0.45)" rx="1"/>
          </g>
        )}

        {data.label && (
          <text x="110" y="214" textAnchor="middle" fontSize="11" fill="#c05020"
                fontFamily="sans-serif" fontWeight="bold">{data.label}</text>
        )}
      </svg>
    </div>
  );
}

  const [idx, setIdx] = useState(0);
  const [image, setImage] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [fbLoading, setFbLoading] = useState(false);
  const camera = useCamera();
  const fileRef = useRef(null);

  const startLesson = async sub => {
    setSubject(sub); setPhase("load");
    const s = await generateSteps(sub, profile.ageGroup);
    setSteps(s); setIdx(0); setImage(null); setFeedback(null); setPhase("lesson");
  };

  const pickRandom = () => {
    const keys = Object.keys(subjects);
    const cat = keys[Math.floor(Math.random()*keys.length)];
    const items = subjects[cat].items;
    startLesson(items[Math.floor(Math.random()*items.length)]);
  };

  const handlePhoto = async dataUrl => {
    setImage(dataUrl); setFbLoading(true); setFeedback(null);
    let result;
    try {
      result = await analyzeDrawingAPI(dataUrl, subject, step?.title, idx, steps.length, profile.ageGroup);
    } catch(e) {
      result = "❌ Грешка: " + (e.message || "Неизвестна грешка") + " — опитай пак.";
    }
    setFeedback(result); setFbLoading(false);
    const prog = db.getProgress(profile.id);
    prog.push({ id:Date.now(), subject, date:new Date().toISOString(), step:idx+1, totalSteps:steps.length, feedback:result, stars:3 });
    db.saveProgress(profile.id, prog);
  };

  const step = steps[idx];
  const topTitle = phase==="cat" ? "Какво да рисуваме? 🤔"
    : phase==="sub" ? `${subjects[category]?.emoji} Избери тема`
    : phase==="load" ? "⏳ Подготвям урок…"
    : `✏️ ${subject} — стъпка ${idx+1}/${steps.length}`;

  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      <TopBar bg={ag.color} onBack={()=>{ camera.stop(); onBack(); }} title={topTitle}/>
      <div style={{ padding:"20px", maxWidth:560, margin:"0 auto" }}>

        {phase==="cat" && <div className="fade-in">
          {Object.entries(subjects).map(([key, cat]) =>
            <button key={key} onClick={()=>{ setCategory(key); setPhase("sub"); }}
              style={{ ...mkBtn(C.white,C.border), width:"100%", color:C.text, marginBottom:14,
                display:"flex", alignItems:"center", gap:20, boxShadow:"0 4px 18px rgba(0,0,0,0.08)", padding:"20px 24px" }}>
              <span style={{ fontSize:52 }}>{cat.emoji}</span>
              <div>
                <div style={{ fontSize:21, fontWeight:900 }}>{cat.label}</div>
                <div style={{ fontSize:13, color:C.textLight, fontWeight:700, marginTop:3 }}>{cat.items.length} теми</div>
              </div>
            </button>
          )}
          <Btn onClick={pickRandom} bg={C.yellow} shadow={C.yellowDark} style={{ width:"100%", fontSize:20, color:C.text }}>🎲 Изненадай ме!</Btn>
        </div>}

        {phase==="sub" && category && <div className="fade-in">
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
            {subjects[category].items.map(item =>
              <button key={item} onClick={()=>startLesson(item)}
                style={{ ...mkBtn(C.white,C.border), color:C.text, fontSize:17,
                  boxShadow:"0 4px 12px rgba(0,0,0,0.07)", textAlign:"center", padding:"16px 10px" }}>{item}</button>
            )}
          </div>
          <button onClick={()=>setPhase("cat")} style={{ ...mkBtn(C.cream,C.border), width:"100%", color:C.textMid, boxShadow:"none", fontSize:16 }}>← Назад</button>
        </div>}

        {phase==="load" && <div style={{ textAlign:"center", padding:"60px 0" }} className="fade-in">
          <span style={{ fontSize:90, display:"inline-block", animation:"bob 1.4s ease-in-out infinite" }}>🎨</span>
          <p style={{ fontSize:22, fontWeight:900, color:C.text, marginTop:24 }}>Claude генерира урок за „{subject}"…</p>
          <p style={{ color:C.textLight, fontSize:17, marginTop:8 }}>Генерирам персонализирани стъпки с AI ✨</p>
        </div>}

        {phase==="lesson" && step && <div className="fade-in">
          <ProgressBar value={idx+1} max={steps.length} color={ag.color}/>

          <Card style={{ marginBottom:16, textAlign:"center" }}>
            <span style={{ background:ag.color+"18", color:ag.color, borderRadius:10, padding:"4px 14px", fontSize:13, fontWeight:900 }}>
              Стъпка {step.step} от {steps.length}
            </span>
            <h2 style={{ fontSize:24, fontWeight:900, color:C.text, margin:"12px 0 8px" }}>{step.emoji} {step.title}</h2>
            <p style={{ fontSize:17, lineHeight:1.7, color:C.textMid, margin:0 }}>{step.instruction}</p>
          </Card>

          <AnimatedStepIllustration subject={subject} stepIdx={idx} ageGroup={profile.ageGroup} isLeft={profile.handedness==="left"}/>

          <Card style={{ marginBottom:14, background:"#FFFDE7" }}>
            <p style={{ fontSize:13, fontWeight:900, color:C.textMid, margin:"0 0 6px" }}>
              ✏️ Ето как трябва да изглежда до момента:
            </p>
            <p style={{ fontSize:12, color:C.textLight, margin:0 }}>Сравни своята рисунка с примера горе.</p>
          </Card>

          <Card style={{ marginBottom:16 }}>
            {profile.ageGroup !== "4-6" && (
              <div style={{ marginTop:14, background:ag.color+"10", borderRadius:12, padding:"8px 12px" }}>
                <p style={{ fontSize:12, color:ag.color, fontWeight:800, margin:0 }}>
                  💡 Гледай инструкцията внимателно и рисувай бавно и спокойно!
                </p>
              </div>
            )}
          </Card>

          {camera.active
            ? <div style={{ background:"#111", borderRadius:24, overflow:"hidden", marginBottom:16 }}>
                <video ref={camera.videoRef} autoPlay playsInline muted style={{ width:"100%", display:"block" }}/>
                <canvas ref={camera.canvasRef} style={{ display:"none" }}/>
                <div style={{ padding:14, display:"flex", gap:12 }}>
                  <Btn onClick={async ()=>{ const d=await camera.capture(); if(d) handlePhoto(d); }}
                    bg={C.yellow} shadow={C.yellowDark} style={{ flex:1, color:C.text, fontSize:20 }}>📸 Снимай!</Btn>
                  <Btn onClick={camera.stop} bg="rgba(255,255,255,0.15)" shadow="transparent"
                    style={{ color:C.white, boxShadow:"none", fontSize:20 }}>✕</Btn>
                </div>
              </div>
            : !image && <div style={{ display:"flex", gap:12, marginBottom:16 }}>
                <Btn onClick={camera.start} bg={C.secondary} shadow={C.secondaryDark} style={{ flex:1, fontSize:15 }}>📷 Снимай рисунката</Btn>
                <button onClick={()=>fileRef.current.click()}
                  style={{ ...mkBtn(C.white,C.border), flex:1, color:C.text, boxShadow:"0 4px 0 "+C.border, fontSize:14 }}>🖼️ Качи снимка</button>
                <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }}
                  onChange={e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=async ev=>{ const compressed = await compressImage(ev.target.result); handlePhoto(compressed); }; r.readAsDataURL(f); }}/>
              </div>
          }

          {image && <Card style={{ marginBottom:16 }}>
            <img src={image} alt="рисунка" style={{ width:"100%", borderRadius:14, marginBottom:14 }}/>
            {fbLoading
              ? <div style={{ textAlign:"center", padding:"12px 0" }}>
                  <span style={{ fontSize:36, display:"inline-block", animation:"bob 1.2s infinite" }}>🤔</span>
                  <p style={{ color:C.textLight, fontSize:16, marginTop:8 }}>Разглеждам рисунката…</p>
                </div>
              : feedback && <>
                  <div style={{ background:C.yellow+"28", border:`2.5px solid ${C.yellow}`, borderRadius:16, padding:"14px 16px", marginBottom:12 }}>
                    <p style={{ fontSize:15, lineHeight:1.75, color:C.text, margin:0 }}>{feedback}</p>
                  </div>
                  <button onClick={()=>{ setImage(null); setFeedback(null); }}
                    style={{ ...mkBtn(C.cream,C.border), width:"100%", color:C.textMid, boxShadow:"none", fontSize:14 }}>🔄 Снимай пак</button>
                </>
            }
          </Card>}

          <div style={{ display:"flex", gap:12 }}>
            {idx>0 && <button onClick={()=>{ setIdx(idx-1); setImage(null); setFeedback(null); }}
              style={{ ...mkBtn(C.cream,C.border), flex:1, color:C.textMid, boxShadow:"0 4px 0 "+C.border }}>← Предишна</button>}
            {idx<steps.length-1
              ? <Btn onClick={()=>{ setIdx(idx+1); setImage(null); setFeedback(null); }}
                  bg={ag.color} shadow={ag.dark} style={{ flex:1 }}>Следваща →</Btn>
              : <Btn onClick={()=>{
                    const prog = db.getProgress(profile.id);
                    prog.push({ id:Date.now(), subject, date:new Date().toISOString(), step:steps.length, totalSteps:steps.length, feedback:"Завършен урок!", stars:3 });
                    db.saveProgress(profile.id, prog);
                    onBack();
                  }}
                  bg={C.yellow} shadow={C.yellowDark} style={{ flex:1, color:C.text, fontSize:20 }}>🎉 Готово!</Btn>
            }
          </div>
        </div>}
      </div>
    </div>
  );
}



// ─── PRACTICE SCREEN ──────────────────────────────────────────────────────────
function PracticeScreen({ profile, onBack }) {
  const ag = AGE_GROUPS.find(a=>a.id===profile.ageGroup) || AGE_GROUPS[1];
  const [subject, setSubject] = useState("");
  const [image, setImage] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [fbLoading, setFbLoading] = useState(false);
  const camera = useCamera();
  const fileRef = useRef(null);
  const analyze = async dataUrl => {
    setImage(dataUrl); setFbLoading(true); setFeedback(null);
    let result;
    try {
      result = await analyzeDrawingAPI(dataUrl, subject, step?.title, idx, steps.length, profile.ageGroup);
    } catch(e) {
      result = "❌ Грешка: " + (e.message || "Неизвестна грешка") + " — опитай пак.";
    }
    setFeedback(result); setFbLoading(false);
    const prog = db.getProgress(profile.id);
    prog.push({ id:Date.now(), subject:subject||"свободно", date:new Date().toISOString(), step:1, totalSteps:1, feedback:result, stars:3 });
    db.saveProgress(profile.id, prog);
  };
  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      <TopBar bg="#43A047" onBack={()=>{ camera.stop(); onBack(); }} title="📸 Провери рисунката си"/>
      <div style={{ padding:"20px", maxWidth:560, margin:"0 auto" }}>
        <Card style={{ marginBottom:16 }}>
          <p style={{ fontWeight:900, fontSize:18, marginBottom:12, color:C.text }}>Какво рисуваш? <span style={{ color:C.textLight, fontWeight:700 }}>(по избор)</span></p>
          <input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="напр. котка, кола, цвете…"
            style={{ width:"100%", padding:"14px 18px", borderRadius:16, border:`2.5px solid ${C.border}`, fontSize:18, fontWeight:800, outline:"none" }}/>
        </Card>
        {camera.active
          ? <div style={{ background:"#111", borderRadius:24, overflow:"hidden", marginBottom:16 }}>
              <video ref={camera.videoRef} autoPlay playsInline muted style={{ width:"100%", display:"block" }}/>
              <canvas ref={camera.canvasRef} style={{ display:"none" }}/>
              <div style={{ padding:14, display:"flex", gap:12 }}>
                <Btn onClick={async ()=>{ const d=await camera.capture(); if(d) analyze(d); }} bg={C.yellow} shadow={C.yellowDark} style={{ flex:1, color:C.text, fontSize:20 }}>📸 Снимай!</Btn>
                <Btn onClick={camera.stop} bg="rgba(255,255,255,0.15)" shadow="transparent" style={{ color:C.white, boxShadow:"none", fontSize:20 }}>✕</Btn>
              </div>
            </div>
          : !image && <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:16 }}>
              <Btn onClick={camera.start} bg="#43A047" shadow="#2E7D32" style={{ fontSize:20 }}>📷 Отвори камера</Btn>
              <button onClick={()=>fileRef.current.click()} style={{ ...mkBtn(C.white,C.border), color:C.text, boxShadow:"0 4px 0 "+C.border, fontSize:18 }}>🖼️ Качи от галерията</button>
              <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }}
                onChange={e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=async ev=>{ const compressed = await compressImage(ev.target.result); analyze(compressed); }; r.readAsDataURL(f); }}/>
            </div>
        }
        {image && <Card>
          <img src={image} alt="рисунка" style={{ width:"100%", borderRadius:18, marginBottom:16 }}/>
          {fbLoading
            ? <div style={{ textAlign:"center", padding:"12px 0" }}>
                <span style={{ fontSize:36, display:"inline-block", animation:"bob 1.2s infinite" }}>🤔</span>
                <p style={{ color:C.textLight, fontSize:17, marginTop:10 }}>Разглеждам рисунката…</p>
              </div>
            : feedback && <>
                <div style={{ background:C.yellow+"28", border:`2.5px solid ${C.yellow}`, borderRadius:18, padding:"16px 18px", marginBottom:14 }}>
                  <p style={{ fontSize:16, lineHeight:1.75, color:C.text, margin:0 }}>{feedback}</p>
                </div>
                <Btn onClick={()=>{ setImage(null); setFeedback(null); }} bg="#43A047" shadow="#2E7D32" style={{ width:"100%", fontSize:17 }}>🔄 Снимай нова рисунка</Btn>
              </>
          }
        </Card>}
      </div>
    </div>
  );
}

// ─── PROGRESS SCREEN ──────────────────────────────────────────────────────────
function ProgressScreen({ profile, onBack }) {
  const ag = AGE_GROUPS.find(a=>a.id===profile.ageGroup) || AGE_GROUPS[1];
  const progress = db.getProgress(profile.id);
  const totalStars = progress.reduce((a,s) => a+(s.stars||0), 0);
  const unique = [...new Set(progress.map(s=>s.subject))].length;
  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      <TopBar bg={C.purple} onBack={onBack} title="🏆 Моят прогрес"/>
      <div style={{ padding:"20px", maxWidth:560, margin:"0 auto" }}>
        <Card style={{ marginBottom:20, textAlign:"center" }}>
          <div style={{ fontSize:72, lineHeight:1 }}>{profile.avatar}</div>
          <h2 style={{ fontSize:28, fontWeight:900, color:C.text, margin:"12px 0 4px" }}>{profile.name}</h2>
          <p style={{ color:ag.color, fontSize:14, fontWeight:800, margin:"0 0 14px" }}>{ag.emoji} {ag.label}</p>
          <div style={{ display:"flex", justifyContent:"center", gap:28 }}>
            {[{val:progress.length,label:"Урока"},{val:`⭐ ${totalStars}`,label:"Звезди"},{val:unique,label:"Теми"}].map(({val,label}) =>
              <div key={label} style={{ textAlign:"center" }}>
                <div style={{ fontSize:28, fontWeight:900, color:ag.color }}>{val}</div>
                <div style={{ fontSize:13, color:C.textLight, fontWeight:800 }}>{label}</div>
              </div>
            )}
          </div>
        </Card>
        {progress.length===0
          ? <div style={{ textAlign:"center", padding:"48px 0", color:C.textLight }}>
              <div style={{ fontSize:64 }}>🎨</div>
              <p style={{ fontSize:19, fontWeight:900, marginTop:16 }}>Все още нямаш завършени уроци.</p>
              <p style={{ fontSize:16, marginTop:8 }}>Започни да рисуваш!</p>
            </div>
          : [...progress].reverse().map((s,i) =>
              <div key={s.id||i} style={{ background:C.white, borderRadius:20, padding:20, marginBottom:12, boxShadow:"0 4px 14px rgba(0,0,0,0.07)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <span style={{ fontWeight:900, fontSize:18, color:C.text }}>🖊️ {s.subject}</span>
                  <span style={{ fontSize:18 }}>{"⭐".repeat(s.stars||2)}</span>
                </div>
                <p style={{ color:C.textLight, fontSize:12, margin:"0 0 8px", fontWeight:800 }}>
                  {new Date(s.date).toLocaleDateString("bg-BG")} · стъпка {s.step}/{s.totalSteps}
                </p>
                {s.feedback && <div style={{ background:C.cream, borderRadius:12, padding:"8px 12px" }}>
                  <p style={{ fontSize:13, color:C.textMid, margin:0, lineHeight:1.6 }}>{s.feedback.substring(0,200)}{s.feedback.length>200?"…":""}</p>
                </div>}
              </div>
            )
        }
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [profile, setProfile] = useState(null);
  const [screen, setScreen] = useState("home");
  if (!profile) return <ProfileScreen onSelect={setProfile}/>;
  if (screen==="learn")    return <LearnScreen    profile={profile} onBack={()=>setScreen("home")}/>;
  if (screen==="sketch")   return <SketchScreen   profile={profile} onBack={()=>setScreen("home")}/>;
  if (screen==="practice") return <PracticeScreen profile={profile} onBack={()=>setScreen("home")}/>;
  if (screen==="progress") return <ProgressScreen profile={profile} onBack={()=>setScreen("home")}/>;
  return <HomeScreen profile={profile} onNav={setScreen} onLogout={()=>{ setProfile(null); setScreen("home"); }}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
